name: VolunteerConnect CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create SSH Directory
        run: mkdir -p ~/.ssh

      - name: Install Private Key
        shell: bash
        run: |
          cat > ~/.ssh/id_rsa << 'EOF'
          ${{ secrets.EC2_PRIVATE_KEY }}
          EOF

          chmod 600 ~/.ssh/id_rsa

      - name: Verify Private Key
        run: |
          echo "Checking key..."
          ls -la ~/.ssh
          file ~/.ssh/id_rsa
          ssh-keygen -lf ~/.ssh/id_rsa

      - name: Add EC2 Host
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "echo SSH Connected"

      - name: Deploy Website
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          cd /opt/volunteerconnect

          echo "Current Directory:"
          pwd

          echo "Fetching latest code..."
          git fetch origin

          git reset --hard origin/main

          source venv/bin/activate

          pip install -r requirements.txt

          sudo systemctl restart volunteerconnect

          sudo systemctl status volunteerconnect --no-pager

          echo "Deployment Completed"

          EOF

      - name: Verify Website
        run: |
          curl http://${{ secrets.EC2_HOST }} || true

      - name: Done
        run: echo "CI/CD Finished Successfully"
