name: VolunteerConnect CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        shell: bash
        run: |
          mkdir -p ~/.ssh

          printf "%s" "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Verify SSH Key
        run: |
          ls -la ~/.ssh
          file ~/.ssh/id_rsa
          ssh-keygen -lf ~/.ssh/id_rsa

      - name: Test SSH Connection
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "echo Connected Successfully"

      - name: Deploy Application
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          cd /opt/volunteerconnect

          git fetch origin
          git reset --hard origin/main

          source venv/bin/activate

          pip install -r requirements.txt

          sudo systemctl restart volunteerconnect

          sudo systemctl status volunteerconnect --no-pager

          echo "Deployment Successful"

          EOF

      - name: Verify Website
        run: |
          curl http://${{ secrets.EC2_HOST }} || true
