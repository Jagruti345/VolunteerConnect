name: Deploy App Update (SSM)

on:
  push:
    branches:
      - main
    paths:
      - 'webapp/**'
      - '.github/workflows/deploy-app.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      BUCKET: ${{ secrets.BUCKET_NAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify Bucket
        run: |
          echo "Bucket: $BUCKET"

          if [ -z "$BUCKET" ]; then
            echo "BUCKET_NAME secret is missing!"
            exit 1
          fi

      - name: Upload Webapp to S3
        run: |
          aws s3 sync ./webapp s3://$BUCKET \
            --delete \
            --exclude "data/*" \
            --exclude "venv/*"

      - name: Find Running EC2 Instance
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=VolunteerConnect-Server" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running VolunteerConnect-Server instance found."
            exit 1
          fi

          echo "Found Instance: $INSTANCE_ID"

          echo "id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Redeploy on EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
        run: |
          cat > commands.json <<EOF
          {
            "commands": [
              "cd /opt/volunteerconnect",
              "aws s3 sync s3://$BUCKET /opt/volunteerconnect --delete --exclude 'data/*' --exclude 'venv/*'",
              "test -d venv || python3 -m venv venv",
              "./venv/bin/pip install -r requirements.txt",
              "sudo systemctl restart volunteerconnect",
              "sleep 5",
              "sudo systemctl status volunteerconnect --no-pager"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --output table

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed."
            exit 1
          fi

          echo "Deployment completed successfully."
