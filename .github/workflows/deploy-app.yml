name: Deploy App Update (SSM)

# Fast path for app-only changes: syncs webapp/ straight to S3, then tells
# the already-running EC2 instance (via SSM, no SSH key needed) to pull the
# update and restart. Use this for day-to-day changes to templates, routes,
# or styling. For infrastructure changes (new resources, instance type,
# etc.) use the "Provision Infrastructure" workflow instead.

on:
  push:
    branches: [ main ]
    paths:
      - 'webapp/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch: {}

jobs:
  # -------------------------------------------------------------- deploy
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync webapp code to S3
        run: |
          aws s3 sync webapp/ "s3://${{ secrets.BUCKET_NAME }}" \
            --delete --exclude "data/*"

      - name: Find the running EC2 instance
        id: instance
        run: |
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=VolunteerConnect-Server" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          if [ "$ID" = "None" ] || [ -z "$ID" ]; then
            echo "No running VolunteerConnect-Server instance found. Deploy infra first with provision.py."
            exit 1
          fi
          echo "Deploying to instance: $ID"
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Redeploy app on EC2 via SSM
        env:
          BUCKET: ${{ secrets.BUCKET_NAME }}
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
        run: |
          cat > commands.json << EOF
          {
            "commands": [
              "cd /opt/volunteerconnect",
              "aws s3 sync s3://$BUCKET /opt/volunteerconnect --delete --exclude 'data/*'",
              "./venv/bin/pip install -r requirements.txt",
              "systemctl restart volunteerconnect",
              "sleep 3",
              "systemctl is-active volunteerconnect"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "CI/CD redeploy from GitHub Actions" \
            --parameters file://commands.json \
            --query "Command.CommandId" --output text)

          echo "SSM command sent: $COMMAND_ID"
          echo "Waiting for it to finish..."

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status, Output:StandardOutputContent, Error:StandardErrorContent}" \
            --output table

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "Redeploy failed (status: $STATUS) - see output above."
            exit 1
          fi

          echo "Deployment successful."
