{% extends "base.html" %}
{% block title %}NGO Login - VolunteerConnect{% endblock %}
{% block content %}

<div class="login-wrap">
  <div class="form-card" style="max-width: 420px;">
    <h2 style="margin-bottom: 6px;">NGO Login</h2>
    <p class="section-sub" style="margin-bottom: 20px;">Log in to post events and view your volunteers.</p>
    <form method="post">
      <div class="field">
        <label>Admin Password</label>
        <input type="password" name="password" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>
  </div>
</div>

{% endblock %}
